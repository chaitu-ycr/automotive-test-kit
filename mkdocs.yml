site_name: automotive-test-kit
site_url: https://chaitu-ycr.github.io/automotive-test-kit/
site_description: "Mono repo of @automotive-test-kit. Includes various packages."
site_author:  chaitu-ycr
repo_name: "chaitu-ycr/automotive-test-kit"
repo_url: https://github.com/chaitu-ycr/automotive-test-kit
edit_uri: blob/main/

nav:
  - Home: index.md

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src  # Root level src if any
          options:
            docstring_style: google
            show_source: false
            merge_init_into_class: true
            show_docstring_modules: false
  - include-markdown:
      recursive: true
  - macros
  - search

theme:
  name: material
  features:
    - toc.integrate
    - search

extra_css:
  - _assets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11.13.0/dist/mermaid.core.mjs
